name: CI/CD Avatares DevOps

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/avatares-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/avatares-web
  STAGING_NAMESPACE: ${{ vars.STAGING_NAMESPACE || 'avatares-staging' }}

jobs:
  # Job backend: crea venv, instala dependencias y ejecuta pruebas de API.
  backend-tests:
    name: Backend tests (venv + pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Crear venv, instalar deps y correr pruebas
        working-directory: api
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidencia
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-test.txt
          python -m pytest tests/ -v --junitxml=evidencia/backend-junit.xml | tee evidencia/backend-tests.log

      - name: Subir evidencia de backend
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-backend
          path: api/evidencia/

  # Job frontend: instala dependencias con npm ci y ejecuta pruebas.
  frontend-tests:
    name: Frontend tests (npm ci + vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar deps y correr pruebas
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidencia
          npm ci
          npm test | tee evidencia/frontend-tests.log

      - name: Subir evidencia de frontend
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-frontend
          path: web/evidencia/

  # Job build: construye imágenes Docker para validar que el build es reproducible.
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Construir imagen API
        run: docker build -t local/avatares-api:ci ./api

      - name: Construir imagen Web
        run: docker build -t local/avatares-web:ci ./web

      - name: Guardar evidencia de build
        shell: bash
        run: |
          mkdir -p evidencia
          {
            echo "Build OK: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Imagen API: local/avatares-api:ci"
            echo "Imagen Web: local/avatares-web:ci"
          } > evidencia/build-images.txt

      - name: Subir evidencia de build
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-build
          path: evidencia/

  # Job publish: publica imágenes en GHCR cuando hay push a main.
  publish-images:
    name: Publish images to registry
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagen API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:sha-${{ github.sha }}
            ${{ env.IMAGE_API }}:latest

      - name: Publicar imagen Web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:sha-${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest

      - name: Guardar evidencia de publicación
        shell: bash
        run: |
          mkdir -p evidencia
          {
            echo "Publish OK: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "API -> ${{ env.IMAGE_API }}:sha-${{ github.sha }}"
            echo "WEB -> ${{ env.IMAGE_WEB }}:sha-${{ github.sha }}"
          } > evidencia/publish-images.txt

      - name: Subir evidencia de publicación
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-publish
          path: evidencia/

  # Job deploy: despliega a staging (requiere secreto KUBE_CONFIG y manifests en k8s/).
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs:
      - publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Cargar kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "Falta el secreto KUBE_CONFIG para desplegar en staging." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Desplegar manifests en staging
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d k8s ]; then
            echo "No existe el directorio k8s/ con manifests para deploy." >&2
            exit 1
          fi
          kubectl get ns "${{ env.STAGING_NAMESPACE }}" >/dev/null 2>&1 || kubectl create ns "${{ env.STAGING_NAMESPACE }}"
          kubectl -n "${{ env.STAGING_NAMESPACE }}" apply -k k8s/
          kubectl -n "${{ env.STAGING_NAMESPACE }}" get pods -o wide

      - name: Guardar evidencia de deploy
        shell: bash
        run: |
          mkdir -p evidencia
          {
            echo "Deploy OK: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Namespace: ${{ env.STAGING_NAMESPACE }}"
            kubectl -n "${{ env.STAGING_NAMESPACE }}" get deploy
          } > evidencia/deploy-staging.txt

      - name: Subir evidencia de deploy
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-deploy
          path: evidencia/

  # Job smoke test: valida health y endpoint principal tras deploy.
  smoke-test:
    name: Smoke test post deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.STAGING_URL != ''
    steps:
      - name: Ejecutar smoke tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidencia
          BASE_URL="${{ vars.STAGING_URL }}"
          echo "Probando URL: $BASE_URL" | tee evidencia/smoke-test.log
          curl -fsS "$BASE_URL/health" | tee -a evidencia/smoke-test.log
          curl -fsS "$BASE_URL/api/avatar/spec" > /dev/null
          echo "Smoke test OK" | tee -a evidencia/smoke-test.log

      - name: Subir evidencia de smoke test
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-smoke
          path: evidencia/
